<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shadows & Daylight: Labyrinth of Excalibur</title>

<style>
body { margin: 0; background: #000; font-family: 'Courier New', monospace; color: #be9b7b; overflow: hidden; }
#game-container { position: relative; width: 1280px; height: 720px; margin: 40px auto; border: 6px solid #be9b7b; background: #000; overflow: hidden; }
#bg { width: 100%; height: 100%; image-rendering: pixelated; position: absolute; }

#winter { position: absolute; width: 93px; z-index: 5; transform-origin: bottom center; pointer-events: none; }

.world-obj { position: absolute; z-index: 4; image-rendering: pixelated; display: none; }
#obj-Vase { width: 54px; }
#obj-Mug { width: 17.5px; } #obj-Balls { width: 35px; } #obj-Phone { width: 20px; }
#obj-Notepad { width: 22px; } #obj-Torch { width: 40px; } #obj-Card { width: 25px; }
#obj-Books { width: 50px; } #obj-Cue { width: 60px; }

#title-screen {
    position: absolute; width: 100%; height: 100%;
    background: rgba(0,0,0,0.9); z-index: 100;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
}

#dialogue {
    position: absolute; top: 30px; width: 84%; left: 8%;
    background: rgba(0,0,0,0.95); border: 3px solid #be9b7b;
    padding: 22px; display: none; z-index: 20; color: white;
}

#inventory-bar {
    position: absolute; bottom: 0; width: 100%; height: 100px;
    background: rgba(0,0,0,0.9); border-top: 3px solid #be9b7b;
    display: flex; align-items: center; padding: 0 20px;
}

.slot {
    width: 65px; height: 65px; border: 2px solid #444;
    margin-right: 10px; display: flex; align-items: center; justify-content: center;
}
.active-slot { border-color: #fff; box-shadow: 0 0 10px #fff; }
</style>
</head>

<body>
<div id="game-container">

<div id="title-screen">
    <h1>LABYRINTH OF EXCALIBUR</h1>
    <p>Press any key or button</p>
</div>

<img id="bg" src="Room1_Library.png">
<img id="winter" src="WinterIdle.png">

<div id="dialogue" onclick="advanceDialogue()"></div>

<div id="inventory-bar">
    <div id="slots-container">
        <div class="slot" id="s0"></div>
        <div class="slot" id="s1"></div>
        <div class="slot" id="s2"></div>
    </div>
</div>

</div>

<script>

/* PASSWORD */
const PASSWORD = "DAYLIGHTER26";
(function () {
    let input = prompt("Enter password:");
    if (input !== PASSWORD) {
        document.body.innerHTML = "<h1 style='color:white;text-align:center;margin-top:20%'>Access Denied</h1>";
        throw new Error("Unauthorized");
    }
})();

/* STATE */
const state = {
    started: false,
    winterX: 80,
    winterY: 550,
    keys: {},
    walkFrame: 0,
    frameTimer: 0,
    inventory: ["Vase","Card","Torch"],
    activeItem: "Vase",
    interactable: null
};

let prevButtons = [];

/* POSITION */
function positionWinter() {
    const w = document.getElementById('winter');
    w.style.left = (state.winterX - 46) + 'px';
    w.style.top = (state.winterY - 120) + 'px';
}

window.onload = () => positionWinter();

/* INPUT */
function handleInput() {
    let dx = 0, dy = 0;

    if (state.keys["KeyW"]) dy -= 5;
    if (state.keys["KeyS"]) dy += 5;
    if (state.keys["KeyA"]) dx -= 5;
    if (state.keys["KeyD"]) dx += 5;

    const gp = navigator.getGamepads()[0];

    if (gp) {
        dx += gp.axes[0] * 5;
        dy += gp.axes[1] * 5;

        gp.buttons.forEach((btn, i) => {
            const prev = prevButtons[i] || false;

            if (btn.pressed && !prev) {
                const dialogueOpen = document.getElementById('dialogue').style.display === 'block';

                if (!state.started) {
                    startGame();
                } else if (dialogueOpen) {
                    advanceDialogue();
                } else {
                    if (i === 0 && state.interactable) state.interactable.action(); // A
                    if (i === 2) investigateItem(); // X
                    if (i === 4) cycleInventory(-1); // LB
                    if (i === 5) cycleInventory(1);  // RB
                }
            }

            prevButtons[i] = btn.pressed;
        });
    }

    return { dx, dy };
}

/* INVENTORY */
function cycleInventory(dir) {
    let idx = state.inventory.indexOf(state.activeItem);
    idx = (idx + dir + state.inventory.length) % state.inventory.length;
    state.activeItem = state.inventory[idx];

    document.querySelectorAll('.slot').forEach(s => s.classList.remove('active-slot'));
    document.getElementById('s' + idx).classList.add('active-slot');
}

function investigateItem() {
    say("Nothing remarkable about this.");
}

/* MOVEMENT */
function updateMovement(dx, dy) {
    const w = document.getElementById('winter');

    if (dx !== 0 || dy !== 0) {
        state.winterX += dx;
        state.winterY += dy;

        state.frameTimer++;
        if (state.frameTimer > 8) {
            state.walkFrame = state.walkFrame === 0 ? 1 : 0;
            w.src = state.walkFrame ? "WinterWalk1.png" : "WinterIdle.png";
            state.frameTimer = 0;
        }

        if (dx !== 0) w.style.transform = `scaleX(${dx < 0 ? -1 : 1})`;
    } else {
        w.src = "WinterIdle.png";
    }

    positionWinter();
}

/* LOOP */
function gameLoop() {
    if (!state.started) return;

    const { dx, dy } = handleInput();
    updateMovement(dx, dy);

    requestAnimationFrame(gameLoop);
}

/* GAME FLOW */
function startGame() {
    state.started = true;
    document.getElementById('title-screen').style.display = 'none';
    positionWinter();
    say("Where am I?");
    gameLoop();
}

/* DIALOGUE */
let dialogueStep = 0;
const lines = ["Where am I?", "This place feels strange..."];

function say(text) {
    const d = document.getElementById('dialogue');
    d.innerHTML = text + "<br><span>(Click or press any button)</span>";
    d.style.display = 'block';
}

function advanceDialogue() {
    dialogueStep++;
    if (dialogueStep < lines.length) say(lines[dialogueStep]);
    else document.getElementById('dialogue').style.display = 'none';
}

/* KEYBOARD */
window.addEventListener("keydown", e => {
    state.keys[e.code] = true;

    const dialogueOpen = document.getElementById('dialogue').style.display === 'block';

    if (!state.started) startGame();
    else if (dialogueOpen) advanceDialogue();
});

window.addEventListener("keyup", e => state.keys[e.code] = false);

</script>
</body>
</html>
