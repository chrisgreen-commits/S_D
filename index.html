<img id="obj-Notepad" src="ItemNotepad.png" class="world-obj">
<img id="obj-Phone" src="ItemPhone.png" class="world-obj">

<script>
    // ... within the state object ...
    const state = {
        // ... previous state variables ...
        phoneStep: 0,
        noteStep: 0
    };

    // Dialogue Arrays for the new items
    const phoneSequence = [
        "I wonder who this belongs too? It's an older cell phone. Early 2000s.",
        "The contact page says, Detective Ambrose Smith."
    ];

    const noteSequence = [
        "A notepad?",
        "There's a note here, 'I've failed. I can't find the sword, or my way out of this wretched place. I'll never know why I was brought here.'",
        "I only hope whoever finds this notepad, and can benefit from my observations and photographs, and solve these mysteries. - Detective Smith.'"
    ];

    // ... updated scenes object for Room 2 ...
    scenes[2] = { 
        bg: "Room2_Hallway.png", 
        hotspots: [ 
            { id: "Back", x: 744 * R2_SCALE_X, y: 759 * R2_SCALE_Y, action: () => changeRoom(1) },
            { id: "Notepad", x: 1872 * R2_SCALE_X, y: 803 * R2_SCALE_Y, action: () => pickup("Notepad", "ItemNotepad.png", "A notepad was left here.") },
            { id: "Phone", x: 369 * R2_SCALE_X, y: 1020 * R2_SCALE_Y, action: () => pickup("Phone", "ItemPhone.png", "Someone dropped their phone.") },
            { id: "Next", x: 1200, y: 400, action: () => changeRoom(3) } 
        ] 
    };

    // Updated Investigate Logic
    function investigateItem() {
        if (state.activeItem === "Books") {
            state.dialogueStep = 0;
            advanceDialogue(); 
        } 
        else if (state.activeItem === "Phone") {
            state.phoneStep = 0;
            advancePhoneDialogue();
        }
        else if (state.activeItem === "Notepad") {
            state.noteStep = 0;
            advanceNoteDialogue();
        }
        else if (state.activeItem) {
            say("Nothing remarkable about this.", true);
        }
    }

    // Sequencers for the new items
    function advancePhoneDialogue() {
        if (state.phoneStep < phoneSequence.length) {
            say(phoneSequence[state.phoneStep], false);
            state.phoneStep++;
            // Setup the dialogue box click to call this function again
            document.getElementById('dialogue').onclick = advancePhoneDialogue;
        } else {
            closeDialogueBox();
        }
    }

    function advanceNoteDialogue() {
        if (state.noteStep < noteSequence.length) {
            say(noteSequence[state.noteStep], false);
            state.noteStep++;
            document.getElementById('dialogue').onclick = advanceNoteDialogue;
        } else {
            closeDialogueBox();
        }
    }

    function closeDialogueBox() {
        document.getElementById('dialogue').style.display = 'none';
        // Reset the click back to the default book advance
        document.getElementById('dialogue').onclick = advanceDialogue;
    }

    // Update renderScene to handle the new objects
    function renderScene() {
        const s = scenes[state.room];
        document.getElementById('bg').src = s.bg;
        
        // Hide all items first
        document.querySelectorAll('.world-obj').forEach(obj => obj.style.display = 'none');

        // Show items only if in the correct room and NOT in inventory
        ["Torch", "Books", "Vase", "Card", "Notepad", "Phone"].forEach(name => {
            const el = document.getElementById('obj-' + name);
            if (!el) return;

            const hs = s.hotspots.find(h => h.id === name);
            if (hs && !state.inventory.includes(name)) {
                // Apply scaling for distance
                let visualScale = 1.0;
                if (state.room === 2) {
                    // Simple perspective for objects in the hallway
                    const p = (hs.y - (150 * R2_SCALE_Y)) / (720 - (150 * R2_SCALE_Y));
                    visualScale = 0.4 + (0.6 * p); 
                }
                
                el.style.left = hs.x + "px"; 
                el.style.top = hs.y + "px"; 
                el.style.width = (70 * visualScale) + "px";
                
                // Light logic for Room 1
                if (state.room === 1 && state.isDark && name !== "Torch") el.style.display = 'none';
                else el.style.display = 'block';
            }
        });
        
        document.getElementById('bg').style.filter = (state.room === 1 && state.isDark) ? "brightness(0.08)" : "none";
    }
</script>
