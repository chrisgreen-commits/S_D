<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shadows & Daylight: Labyrinth of Excalibur</title>
    <style>
        body { margin: 0; background: #000; font-family: 'Courier New', monospace; color: #be9b7b; overflow: hidden; }
        #game-container { 
            position: relative; width: 1280px; height: 720px; 
            margin: 40px auto; border: 6px solid #be9b7b; 
            background: #000; overflow: hidden; transition: opacity 0.5s;
        }
        #bg { width: 100%; height: 100%; image-rendering: pixelated; position: absolute; }
        #winter { position: absolute; width: 93px; z-index: 5; transform-origin: bottom center; pointer-events: none; }
        
        #interact-prompt {
            position: absolute; background: rgba(255,255,255,0.9); color: #000;
            padding: 5px 12px; border-radius: 4px; font-weight: bold;
            font-size: 20px; z-index: 50; display: none; transform: translate(-50%, -100%);
            pointer-events: none; border: 2px solid #be9b7b;
        }

        #title-screen {
            position: absolute; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; transition: opacity 1s; cursor: pointer;
        }
        .title-small { font-size: 24px; letter-spacing: 5px; color: #be9b7b; margin: 0; user-select: none; }
        #title-screen .main-title { font-size: 45px; letter-spacing: 9px; color: #fff; text-shadow: 0 0 22px #be9b7b; margin: 15px 0; user-select: none; }
        #title-screen p { font-size: 18px; letter-spacing: 3px; color: #be9b7b; animation: blink 2s infinite; user-select: none; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .world-obj { position: absolute; z-index: 4; image-rendering: pixelated; display: none; width: 70px; }
        
        #inventory-bar { 
            position: absolute; bottom: 0; width: 100%; height: 100px; 
            background: rgba(0,0,0,0.9); border-top: 3px solid #be9b7b; 
            display: flex; align-items: center; padding: 0 20px; z-index: 10;
        }
        #investigate-btn { font-size: 40px; cursor: pointer; margin-left: 20px; background: #222; border: 2px solid #be9b7b; border-radius: 5px; padding: 5px 15px; user-select: none; }
        #slots-container { display: flex; overflow-x: auto; flex-grow: 1; }
        .slot { min-width: 65px; height: 65px; border: 2px solid #444; margin-right: 10px; background: #111; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .slot img { width: 50px; height: 50px; }
        .active-slot { border-color: #fff; box-shadow: 0 0 12px #fff; }
        
        #dialogue { 
            position: absolute; top: 30px; width: 84%; left: 8%; 
            background: rgba(0,0,0,0.95); border: 3px solid #be9b7b; 
            padding: 22px; display: none; z-index: 20; color: white; 
            line-height: 1.4; font-size: 22px; cursor: pointer; 
        }
        #dialogue span { display: block; margin-top: 10px; font-size: 14px; color: #be9b7b; font-style: italic; }
        #active-txt-label { font-size: 16px; color: #be9b7b; margin-right: 15px; }
    </style>
</head>
<body>

<div id="game-container">
    <audio id="mus-room1" loop><source src="Dark_ Elves_Jimena Contreras.mp3" type="audio/mpeg"></audio>
    <audio id="mus-room2" loop><source src="Yacoby_Schwartzy.mp3" type="audio/mpeg"></audio>
    
    <div id="interact-prompt">PRESS E</div>
    
    <div id="title-screen" onclick="startGame()">
        <div class="title-small">SHADOWS & DAYLIGHT</div>
        <div class="main-title">LABYRINTH OF EXCALIBUR</div>
        <div class="title-small" style="margin-bottom: 50px;">By Christopher Green</div>
        <p>CLICK TO BEGIN</p>
    </div>

    <img id="bg" src="Room1_Library.png">
    
    <img id="obj-Torch" src="ItemTorch.png" class="world-obj">
    <img id="obj-Books" src="ItemBooks.png" class="world-obj">
    <img id="obj-Vase" src="ItemVase.png" class="world-obj">
    <img id="obj-Card" src="ItemCard.png" class="world-obj">
    <img id="obj-Notepad" src="ItemNotepad.png" class="world-obj">
    <img id="obj-Phone" src="ItemPhone.png" class="world-obj">
    <img id="obj-Balls" src="ItemBalls.png" class="world-obj">
    <img id="obj-Cue" src="ItemCue.png" class="world-obj">
    <img id="obj-Mug" src="ItemMug.png" class="world-obj">
    
    <img id="winter" src="WinterIdle.png">
    
    <div id="dialogue" onclick="advanceDialogue()"></div>

    <div id="inventory-bar">
        <div id="active-txt-label">EQUIPPED: <span id="active-txt" style="color:#fff">NONE</span></div>
        <div id="slots-container">
            <div class="slot" id="s0" onclick="selectItem(0)"></div>
            <div class="slot" id="s1" onclick="selectItem(1)"></div>
            <div class="slot" id="s2" onclick="selectItem(2)"></div>
            <div class="slot" id="s3" onclick="selectItem(3)"></div>
            <div class="slot" id="s4" onclick="selectItem(4)"></div>
            <div class="slot" id="s5" onclick="selectItem(5)"></div>
            <div class="slot" id="s6" onclick="selectItem(6)"></div>
            <div class="slot" id="s7" onclick="selectItem(7)"></div>
            <div class="slot" id="s8" onclick="selectItem(8)"></div>
        </div>
        <div id="investigate-btn" onclick="investigateItem()">🔍</div>
    </div>
</div>

<script>
    const GLOBAL_VOLUME = 0.25; 
    const SCALE_X = 1280 / 1376;
    const SCALE_Y = 720 / 768;
    const R2_SCALE_X = 1280 / 2629; 
    const R2_SCALE_Y = 720 / 1479;
    const R3_SCALE_X = 1280 / 2629; 
    const R3_SCALE_Y = 720 / 1479;

    const state = {
        room: 1, inventory: [], activeItem: null,
        isDark: true, dialogueStep: 0, remarkMade: false,
        winterX: 80, winterY: 550, started: false, keys: {},
        interactable: null, vasePlaced: false, cutsceneStep: 0
    };

    const dialogueSequences = {
        "Books": ["Hmm, a book about King Arthur.", "Excalibur, King Arthur's sword, is believed to be hidden in Avalon...", "As tempting as it would be to find a missing relic, I'm interested in getting out of here."],
        "Phone": ["I wonder who this belongs too? Early 2000s.", "The contact page says, Detective Ambrose Smith."],
        "Notepad": ["A notepad?", "There's a note here, 'I've failed. I can't find the sword...' - Detective Smith.'"]
    };

    const scenes = {
        1: { bg: "Room1_Library.png", hotspots: [
            { id: "Torch", x: 608 * SCALE_X, y: 407 * SCALE_Y, action: () => { if(state.isDark){ pickup("Torch", "ItemTorch.png", "A torch! This helps."); state.isDark=false; renderScene();} } },
            { id: "Books", x: 951 * SCALE_X, y: 310 * SCALE_Y, action: () => pickup("Books", "ItemBooks.png", "Found some old books.") },
            { id: "Vase", x: 779 * SCALE_X, y: 302 * SCALE_Y, action: () => pickup("Vase", "ItemVase.png", "A dusty vase.") },
            { id: "Card", x: 436 * SCALE_X, y: 180 * SCALE_Y, action: () => pickup("Card", "ItemCard.png", "A playing card.") },
            { id: "Exit", x: 1153 * SCALE_X, y: 412 * SCALE_Y, action: () => { if(state.remarkMade) changeRoom(2); } }
        ]},
        2: { bg: "Room2_Hallway.png", hotspots: [ 
            { id: "Back", x: 744 * R2_SCALE_X, y: 759 * R2_SCALE_Y, action: () => changeRoom(1) },
            { id: "Notepad", x: 1872 * R2_SCALE_X, y: 803 * R2_SCALE_Y, action: () => pickup("Notepad", "ItemNotepad.png", "I found a notepad.") },
            { id: "Phone", x: 369 * R2_SCALE_X, y: 1020 * R2_SCALE_Y, action: () => pickup("Phone", "ItemPhone.png", "An old cell phone.") },
            { id: "Next", x: 2450 * R2_SCALE_X, y: 600 * R2_SCALE_Y, action: () => handleHallwayExit() } 
        ]},
        3: { bg: "Room3_Billiards.png", hotspots: [ 
            { id: "ExitLeft", x: 100 * R3_SCALE_X, y: 450 * R3_SCALE_Y, action: () => say("This door is also locked.", true) },
            { id: "Balls", x: 2000 * R3_SCALE_X, y: 1000 * R3_SCALE_Y, action: () => pickup("Balls", "ItemBalls.png", "Maybe I'll keep these pool balls and a cue, in case I need to defend myself.") },
            { id: "Cue", x: 2050 * R3_SCALE_X, y: 1020 * R3_SCALE_Y, action: () => pickup("Cue", "ItemCue.png", "Maybe I'll keep these pool balls and a cue, in case I need to defend myself.") },
            { id: "Mug", x: 1250 * R3_SCALE_X, y: 1040 * R3_SCALE_Y, action: () => pickup("Mug", "ItemMug.png", "Hmm. Well, if this place has a coffee machine, this might come in handy.") },
            { id: "Flower", x: 1796 * R3_SCALE_X, y: 692 * R3_SCALE_Y, action: () => handleFlower() }
        ]}
    };

    function handleFlower() {
        if (state.vasePlaced) {
            changeRoom(5);
        } else if (state.activeItem === "Vase") {
            state.cutsceneStep = 1;
            document.getElementById('bg').src = "Room3_Billiards2.png";
            say("Much better!", false);
        } else {
            say("Someone dumped this flower here? Odd. Shame to let it go to waste.", true);
        }
    }

    function advanceDialogue() {
        const d = document.getElementById('dialogue');
        const winter = document.getElementById('winter');

        // Cutscene Logic for Room 3 Flower
        if (state.cutsceneStep === 1) {
            state.cutsceneStep = 2;
            winter.src = "WinterIdleShock.png";
            say("W-What's that noise?", false);
        } else if (state.cutsceneStep === 2) {
            state.cutsceneStep = 0;
            state.vasePlaced = true;
            document.getElementById('bg').src = "Room3_Billiards3.png";
            winter.src = "WinterIdle.png";
            d.style.display = 'none';
        } else {
            // Standard Dialogue Logic
            const seq = dialogueSequences[state.activeItem];
            if (seq && state.dialogueStep < seq.length) {
                say(seq[state.dialogueStep], false);
                state.dialogueStep++;
            } else {
                if (state.activeItem === "Books") state.remarkMade = true;
                d.style.display = 'none';
            }
        }
    }

    function handleHallwayExit() {
        if (state.activeItem === "Card") {
            say("Hey, maybe I can use this card pick the lock. It worked!", true);
            setTimeout(() => changeRoom(3), 2000);
        } else {
            say("Hmm, the door is locked. I need something to open it with.", true);
        }
    }

    window.addEventListener("keydown", e => state.keys[e.code] = true);
    window.addEventListener("keyup", e => state.keys[e.code] = false);
    window.addEventListener("keydown", e => { if(e.code === "KeyE" && state.interactable) state.interactable.action(); });

    function startGame() {
        state.started = true;
        document.getElementById('title-screen').style.display = 'none';
        changeRoom(1, true); 
        gameLoop();
    }

    function changeRoom(id, isInitial = false) {
        document.getElementById('game-container').style.opacity = "0";
        const m1 = document.getElementById('mus-room1');
        const m2 = document.getElementById('mus-room2');
        m1.volume = m2.volume = GLOBAL_VOLUME;

        setTimeout(() => {
            state.room = id;
            m1.pause(); m2.pause();
            if (id === 1) { m1.currentTime = 0; m1.play(); state.winterX = isInitial ? 80 : 1100; state.winterY = 550; } 
            else if (id === 2) { m2.currentTime = 0; m2.play(); state.winterX = 150; state.winterY = 550; }
            else if (id === 3) { state.winterX = 80; state.winterY = 550; }
            renderScene();
            document.getElementById('game-container').style.opacity = "1";
        }, 500);
    }

    function gameLoop() {
        if(!state.started) return;
        updateMovement();
        checkProximity();
        requestAnimationFrame(gameLoop);
    }

    function updateMovement() {
        if (state.cutsceneStep > 0) return; // Freeze movement during cutscene
        let dx = 0, dy = 0;
        if (state.keys["KeyW"]) dy -= 5; if (state.keys["KeyS"]) dy += 5;
        if (state.keys["KeyA"]) dx -= 5; if (state.keys["KeyD"]) dx += 5;
        if (dx !== 0 || dy !== 0) {
            state.winterX = Math.max(50, Math.min(1230, state.winterX + dx));
            state.winterY = Math.max(216, Math.min(680, state.winterY + dy));
            const winter = document.getElementById('winter');
            winter.style.left = (state.winterX - 46) + 'px'; 
            winter.style.top = (state.winterY - 120) + 'px'; 
            if (dx !== 0) winter.style.transform = `scaleX(${dx < 0 ? -1 : 1})`;
        }
    }

    function checkProximity() {
        const prompt = document.getElementById('interact-prompt');
        let found = null;
        scenes[state.room].hotspots.forEach(hs => {
            if (["Exit", "Next", "Back", "ExitLeft", "Flower"].indexOf(hs.id) === -1 && state.inventory.includes(hs.id)) return;
            if (hs.id === "Exit" && !state.remarkMade) return;
            const dx = Math.abs(state.winterX - hs.x);
            const dy = Math.abs(state.winterY - hs.y);
            if (dx < 80 && dy < 250) found = hs;
        });
        if (found) {
            state.interactable = found;
            prompt.style.display = 'block';
            prompt.style.left = state.winterX + 'px';
            prompt.style.top = (state.winterY - 180) + 'px';
        } else { prompt.style.display = 'none'; state.interactable = null; }
    }

    function investigateItem() {
        if (dialogueSequences[state.activeItem]) {
            state.dialogueStep = 0;
            advanceDialogue();
        } else if (state.activeItem) say("Nothing remarkable about this.", true);
    }

    function pickup(name, img, msg) {
        state.inventory.push(name);
        document.getElementById('obj-'+name).style.display = 'none';
        const idx = state.inventory.length - 1;
        if(idx < 9) document.getElementById('s' + idx).innerHTML = `<img src="${img}">`;
        say(msg, true);
    }

    function selectItem(idx) {
        if (!state.inventory[idx]) return;
        state.activeItem = state.inventory[idx];
        document.getElementById('active-txt').innerText = state.activeItem.toUpperCase();
        document.querySelectorAll('.slot').forEach(s => s.classList.remove('active-slot'));
        document.getElementById('s' + idx).classList.add('active-slot');
    }

    function say(msg, autoHide) {
        const d = document.getElementById('dialogue');
        d.innerHTML = msg + (autoHide ? "" : "<span>(Click to continue)</span>");
        d.style.display = 'block';
        if (autoHide) setTimeout(() => { if(d.innerHTML.includes(msg)) d.style.display = 'none'; }, 4000);
    }

    function renderScene() {
        const s = scenes[state.room];
        document.getElementById('bg').src = s.bg;
        document.getElementById('bg').style.filter = (state.room === 1 && state.isDark) ? "brightness(0.08)" : "none";
        ["Torch", "Books", "Vase", "Card", "Notepad", "Phone", "Balls", "Cue", "Mug"].forEach(name => {
            const el = document.getElementById('obj-' + name);
            if (!el) return;
            const hs = s.hotspots.find(h => h.id === name);
            if (hs && !state.inventory.includes(name)) {
                el.style.left = hs.x + "px"; el.style.top = hs.y + "px";
                el.style.width = (state.room === 2 && (name === "Phone" || name === "Notepad")) ? "35px" : "70px";
                if (state.room === 1 && state.isDark && name !== "Torch") el.style.display = 'none';
                else el.style.display = 'block';
            } else el.style.display = 'none';
        });
    }
</script>
</body>
</html>
