<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>S&D: Excalibur's Labyrinth - Adventure Edition</title>
    <style>
        body { margin: 0; background: #000; font-family: 'Courier New', monospace; color: #be9b7b; overflow: hidden; }
        #game-container { position: relative; width: 800px; height: 600px; margin: 20px auto; border: 4px solid #be9b7b; background: #000; }
        #bg { width: 100%; height: 100%; image-rendering: pixelated; position: absolute; }
        #winter { position: absolute; bottom: 80px; width: 110px; z-index: 5; }
        #npc { position: absolute; bottom: 80px; right: 100px; width: 120px; display: none; z-index: 4; }
        
        #inventory { position: absolute; bottom: 0; width: 100%; height: 75px; background: rgba(0,0,0,0.9); border-top: 2px solid #be9b7b; display: flex; align-items: center; padding: 0 20px; z-index: 10; }
        .slot { width: 55px; height: 55px; border: 1px solid #444; margin-right: 12px; background: #111; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .slot img { width: 45px; height: 45px; }
        .active-slot { border-color: #fff; box-shadow: 0 0 8px #fff; }

        #dialogue { position: absolute; top: 20px; width: 84%; left: 8%; background: rgba(0,0,0,0.95); border: 2px solid #be9b7b; padding: 15px; display: none; z-index: 20; color: white; line-height: 1.4; }
        .hotspot { position: absolute; cursor: pointer; z-index: 8; }
        .hotspot:hover { background: rgba(190, 155, 123, 0.15); border: 1px solid #be9b7b; }
    </style>
</head>
<body>

<div id="game-container">
    <img id="bg" src="Room1_Library.png">
    <img id="winter" src="WinterIdle.png" style="left: 100px;">
    <img id="npc" src="KidnapperTalk.png">
    <div id="dialogue"></div>
    <div id="inventory">
        <div class="slot" id="s0" onclick="selectItem(0)"></div>
        <div class="slot" id="s1" onclick="selectItem(1)"></div>
        <div class="slot" id="s2" onclick="selectItem(2)"></div>
        <div class="slot" id="s3" onclick="selectItem(3)"></div>
        <div class="slot" id="s4" onclick="selectItem(4)"></div>
        <div style="margin-left: auto; font-size: 14px;">EQUIPPED: <span id="active-txt" style="color:#fff">NONE</span></div>
    </div>
    <div id="click-layer"></div>
</div>

<script>
    const state = {
        room: 1,
        inventory: [],
        activeItem: null,
        isDark: true,
        winterPos: 100,
        isWalking: false,
        vaseFixed: false
    };

    const assets = {
        idle: "WinterIdle.png",
        walk: "WinterWalk1.png"
    };

    function moveWinter(targetX, callback) {
        if (state.isWalking) return;
        state.isWalking = true;
        const winter = document.getElementById('winter');
        const distance = Math.abs(targetX - state.winterPos);
        const duration = distance * 5; // Controls the "not too fast/slow" speed
        
        // Walk Animation Loop
        let frame = 0;
        const animInterval = setInterval(() => {
            winter.src = (frame % 2 === 0) ? assets.walk : assets.idle;
            frame++;
        }, 200); // 200ms feels like a steady walk

        // Movement Transition
        winter.style.transition = `left ${duration}ms linear`;
        winter.style.left = targetX + 'px';
        winter.style.transform = targetX < state.winterPos ? "scaleX(-1)" : "scaleX(1)";

        setTimeout(() => {
            clearInterval(animInterval);
            winter.src = assets.idle;
            state.isWalking = false;
            state.winterPos = targetX;
            if (callback) callback();
        }, duration);
    }

    const scenes = {
        1: {
            bg: "Room1_Library.png",
            setup: () => {
                createHotspot(380, 200, 60, 100, "Torch", () => {
                    pickup("Torch", "ItemTorch.png", "The torch is lit... this place looks like a dungeon library.");
                    state.isDark = false;
                    renderScene();
                });
                createHotspot(150, 400, 100, 50, "Vase", () => pickup("Vase", "ItemVase.png", "An old vase. It's empty, but maybe I can use it later."));
                createHotspot(650, 450, 60, 60, "Card", () => pickup("Card", "ItemCard.png", "A playing card. I should keep this handy."));
                createHotspot(750, 50, 50, 500, "Exit", () => {
                    if (state.isDark) say("Where am I? Why is it so dark? I better find some light.");
                    else changeRoom(2);
                });
            }
        },
        2: {
            bg: "Room2_Hallway.png",
            setup: () => {
                createHotspot(200, 300, 50, 50, "Phone", () => {
                    pickup("Phone", "ItemPhone.png", "Detective Ambrose Smith... I wonder how he got here?");
                });
                createHotspot(400, 300, 50, 50, "Notepad", () => {
                    say("I've failed. I can't find the sword, or my way out of this wretched place. - Detective Smith.");
                    pickup("Notepad", "ItemNotepad.png", "This notepad might help me solve these mysteries.");
                });
                createHotspot(700, 100, 100, 400, "Locked Door", () => {
                    if (state.activeItem === "Card") {
                        say("Hey, maybe I can use this card to pick the lock... It worked!");
                        setTimeout(() => changeRoom(3), 2000);
                    } else {
                        say("I'll need a key or something to open this.");
                    }
                });
            }
        },
        3: {
            bg: "Room3_Billiards.png",
            setup: () => {
                createHotspot(250, 300, 200, 100, "Pool Table", () => {
                    say("Maybe I'll keep these pool balls and a cue, in case I need to defend myself.");
                    pickup("Cue", "ItemCue.png", "Added Pool Cue to inventory.");
                    setTimeout(() => pickup("Balls", "ItemBalls.png", "Added Pool Balls to inventory."), 1000);
                });
                createHotspot(420, 150, 80, 150, "Fireplace", () => {
                    if (state.activeItem === "Vase") {
                        say("If I put the flower in the vase here... look! A secret passageway!");
                        state.vaseFixed = true;
                        setTimeout(() => changeRoom(5), 2500);
                    } else {
                        say("Someone dumped this flower here? Odd. If only I had a vase to put it in.");
                    }
                });
            }
        },
        5: {
            bg: "Room5_Rooftop.png",
            setup: () => {
                document.getElementById('npc').style.display = 'block';
                say("Kidnapper: 'You've succeeded where world renowned detectives failed. Let's find the real Avalon!'");
            }
        }
    };

    function createHotspot(x, y, w, h, name, action) {
        const hs = document.createElement('div');
        hs.className = 'hotspot';
        hs.style.left = x + 'px'; hs.style.top = y + 'px';
        hs.style.width = w + 'px'; hs.style.height = h + 'px';
        hs.onclick = () => moveWinter(x - 30, action);
        document.getElementById('click-layer').appendChild(hs);
    }

    function pickup(name, img, msg) {
        if (state.inventory.includes(name)) return;
        state.inventory.push(name);
        const slot = document.getElementById('s' + (state.inventory.length - 1));
        if (slot) slot.innerHTML = `<img src="${img}">`;
        say(msg);
    }

    function selectItem(idx) {
        if (!state.inventory[idx]) return;
        state.activeItem = state.inventory[idx];
        document.getElementById('active-txt').innerText = state.activeItem.toUpperCase();
        document.querySelectorAll('.slot').forEach(s => s.classList.remove('active-slot'));
        document.getElementById('s' + idx).classList.add('active-slot');
    }

    function say(msg) {
        const d = document.getElementById('dialogue');
        d.innerText = msg;
        d.style.display = 'block';
        setTimeout(() => { if(d.innerText === msg) d.style.display = 'none'; }, 4500);
    }

    function changeRoom(n) {
        state.room = n;
        renderScene();
    }

    function renderScene() {
        document.getElementById('click-layer').innerHTML = "";
        document.getElementById('npc').style.display = 'none';
        const s = scenes[state.room];
        document.getElementById('bg').src = s.bg;
        document.getElementById('bg').style.filter = (state.room === 1 && state.isDark) ? "brightness(0.08)" : "none";
        s.setup();
    }

    window.onload = () => renderScene();
</script>
</body>
</html>
