<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shadows & Daylight: Labyrinth of Excalibur</title>
    <style>
        body { margin: 0; background: #000; font-family: 'Courier New', monospace; color: #be9b7b; overflow: hidden; }
        #game-container { 
            position: relative; width: 1280px; height: 720px; 
            margin: 40px auto; border: 6px solid #be9b7b; 
            background: #000; overflow: hidden;
        }
        #bg { width: 100%; height: 100%; image-rendering: pixelated; position: absolute; z-index: 1; }
        
        #password-screen {
            position: absolute; width: 100%; height: 100%; 
            background: #000; z-index: 200;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        #password-input {
            background: #111; border: 2px solid #be9b7b; color: #fff;
            padding: 10px; font-size: 24px; font-family: 'Courier New';
            text-align: center; margin-top: 20px; outline: none;
        }

        #fade-overlay {
            position: absolute; width: 100%; height: 100%;
            background: black; z-index: 90; pointer-events: none;
            opacity: 0; transition: opacity 0.5s;
        }

        #clue-overlay {
            position: absolute; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 80;
            display: none; justify-content: center; align-items: center;
        }
        #clue-img { width: 300px; border: 15px solid #fff; box-shadow: 0 0 20px rgba(0,0,0,0.5); image-rendering: pixelated; }

        #winter { position: absolute; width: 93px; z-index: 10; transform-origin: bottom center; pointer-events: none; }
        #winter.small { width: 58px; }
        #kidnapper { position: absolute; height: 165px; width: auto; z-index: 9; image-rendering: pixelated; display: none; }

        #interact-prompt {
            position: absolute; background: rgba(255,255,255,0.9); color: #000;
            padding: 5px 12px; border-radius: 4px; font-weight: bold;
            font-size: 20px; z-index: 50; display: none; transform: translate(-50%, -100%);
            pointer-events: none; border: 2px solid #be9b7b;
        }

        #title-screen, #end-screen {
            position: absolute; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); z-index: 100;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; transition: opacity 1s; padding: 40px; box-sizing: border-box;
        }
        
        .world-obj { position: absolute; image-rendering: pixelated; display: none; }
        /* Room 1 objects have low z-index by default to hide behind darkened BG */
        #obj-Mug { width: 17.5px; z-index: 5; } #obj-Balls { width: 35px; z-index: 5; } #obj-Phone { width: 20.1px; z-index: 5; } 
        #obj-Notepad { width: 21.8px; z-index: 5; } #obj-Vase { width: 60px; z-index: 5; }
        #obj-Torch { width: 40px; z-index: 20; } /* Torch is always above the darkness */
        #obj-Card { width: 25px; z-index: 5; } #obj-Books { width: 50px; z-index: 5; } #obj-Cue { width: 60px; z-index: 5; }
        
        #inventory-bar { 
            position: absolute; bottom: 0; width: 100%; height: 100px; 
            background: rgba(0,0,0,0.9); border-top: 3px solid #be9b7b; 
            display: flex; align-items: center; padding: 0 20px; z-index: 100;
        }
        #investigate-btn { font-size: 40px; cursor: pointer; margin-right: 70px; background: #222; border: 2px solid #be9b7b; border-radius: 5px; padding: 5px 15px; user-select: none; }
        #slots-container { display: flex; overflow-x: auto; flex-grow: 1; }
        .slot { min-width: 65px; height: 65px; border: 2px solid #444; margin-right: 10px; background: #111; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .slot img { width: 50px; height: 50px; }
        .active-slot { border-color: #fff; box-shadow: 0 0 12px #fff; background: #333; }
        
        #dialogue { 
            position: absolute; top: 30px; width: 84%; left: 8%; 
            background: rgba(0,0,0,0.95); border: 3px solid #be9b7b; 
            padding: 22px; display: none; z-index: 110; color: white; 
            line-height: 1.4; font-size: 22px; cursor: pointer; min-height: 100px;
        }
        #dialogue img { float: left; width: 80px; height: 80px; margin-right: 20px; border: 2px solid #be9b7b; image-rendering: pixelated; background: #111; }
        #dialogue span { display: block; margin-top: 10px; font-size: 14px; color: #be9b7b; font-style: italic; clear: both; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>

<div id="game-container">
    <div id="password-screen">
        <div class="title-small">ENTER ACCESS KEY</div>
        <input type="password" id="password-input" autofocus>
    </div>

    <div id="fade-overlay"></div>
    <div id="clue-overlay" onclick="closeClue()"><img id="clue-img" src="ItemCard.png"></div>

    <audio id="mus-room1" loop><source src="Dark_ Elves_Jimena Contreras.mp3" type="audio/mpeg"></audio>
    <audio id="mus-room2" loop><source src="Yacoby_Schwartzy.mp3" type="audio/mpeg"></audio>
    <audio id="mus-room3" loop><source src="Never_Dont_Stop_Schwartzy.mp3" type="audio/mpeg"></audio>
    <audio id="mus-room5" loop><source src="Taking_Chances_The_Soundings.mp3" type="audio/mpeg"></audio>
    
    <div id="interact-prompt">PRESS E / (A)</div>
    
    <div id="title-screen" onclick="startGame()">
        <div class="title-small">SHADOWS & DAYLIGHT</div>
        <div class="main-title">LABYRINTH OF EXCALIBUR</div>
        <div class="title-small" style="margin-bottom: 50px;">By Christopher Green</div>
        <p style="animation: blink 2s infinite;">PRESS ANY BUTTON TO BEGIN</p>
    </div>

    <div id="end-screen" onclick="location.reload()">
        <div class="main-title">TO BE CONTINUED...</div>
        <div class="title-small">Written & created by Christopher Green</div>
    </div>

    <img id="bg" src="Room1_Library.png">
    <img id="obj-Torch" src="ItemTorch.png" class="world-obj">
    <img id="obj-Books" src="ItemBooks.png" class="world-obj">
    <img id="obj-Vase" src="ItemVase.png" class="world-obj">
    <img id="obj-Card" src="ItemCard.png" class="world-obj">
    <img id="obj-Notepad" src="ItemNotepad.png" class="world-obj">
    <img id="obj-Phone" src="ItemPhone.png" class="world-obj">
    <img id="obj-Balls" src="ItemBalls.png" class="world-obj">
    <img id="obj-Cue" src="ItemCue.png" class="world-obj">
    <img id="obj-Mug" src="ItemMug.png" class="world-obj">
    
    <img id="kidnapper" src="KidnapperTalk1.png">
    <img id="winter" src="WinterIdle.png">
    <div id="dialogue" onclick="advanceDialogue()"></div>

    <div id="inventory-bar">
        <div style="font-size: 14px; color: #be9b7b; margin-right: 15px;">EQUIPPED: <br><span id="active-txt" style="color:#fff">NONE</span></div>
        <div id="investigate-btn" onclick="investigateItem()">🔍</div>
        <div id="slots-container">
            <div class="slot" id="s0" onclick="selectItem(0)"></div>
            <div class="slot" id="s1" onclick="selectItem(1)"></div>
            <div class="slot" id="s2" onclick="selectItem(2)"></div>
            <div class="slot" id="s3" onclick="selectItem(3)"></div>
            <div class="slot" id="s4" onclick="selectItem(4)"></div>
            <div class="slot" id="s5" onclick="selectItem(5)"></div>
            <div class="slot" id="s6" onclick="selectItem(6)"></div>
            <div class="slot" id="s7" onclick="selectItem(7)"></div>
            <div class="slot" id="s8" onclick="selectItem(8)"></div>
        </div>
    </div>
</div>

<script>
    const GLOBAL_VOLUME = 0.10; 
    const SCALE_X = 1280 / 1376;
    const SCALE_Y = 720 / 768;
    const R_W_SCALE_X = 1280 / 2629; 
    const R_W_SCALE_Y = 720 / 1479;

    const state = {
        authenticated: false, room: 1, inventory: [], activeItem: null,
        isDark: true, dialogueStep: 0, remarkMade: false,
        winterX: 80, winterY: 550, started: false, keys: {},
        interactable: null, vasePlaced: false, cutsceneStep: 0,
        kidnapperTalking: false, phoneDead: false, notepadRead: false,
        lockpicking: false, isShocked: false, walkFrame: 0, frameTimer: 0,
        room2DoorUnlocked: false, lastGamepadButtons: [], gameFinished: false
    };

    // --- Authentication ---
    document.getElementById('password-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            if (e.target.value.toUpperCase() === "DAYLIGHTER26") {
                state.authenticated = true;
                document.getElementById('password-screen').style.display = 'none';
                document.getElementById('title-screen').style.display = 'flex';
                requestAnimationFrame(globalGamepadLoop); 
            } else {
                alert("ACCESS DENIED");
                e.target.value = "";
            }
        }
    });

    // Unified controller checking for the whole lifecycle
    function globalGamepadLoop() {
        const gp = navigator.getGamepads()[0];
        if (gp) {
            const currentButtons = gp.buttons.map(b => b.pressed);
            const pressedNow = currentButtons.some((p, i) => p && !state.lastGamepadButtons[i]);
            
            if (pressedNow) {
                if (!state.started) {
                    startGame();
                } else if (document.getElementById('dialogue').style.display === 'block') {
                    advanceDialogue();
                } else if (state.interactable) {
                    state.interactable.action();
                }
            }
            state.lastGamepadButtons = currentButtons;
        }
        requestAnimationFrame(globalGamepadLoop);
    }

    const dialogueSequences = {
        "Books": ["Hmm, a book about King Arthur.", "Excalibur, King Arthur's sword, is believed to be hidden in Avalon...", "As tempting as it would be, I'm interested in getting out of here."],
        "Phone": ["I wonder who this belongs too? Detective Ambrose Smith."],
        "Notepad": ["A notepad?", "I've failed. I only hope whoever finds this notepad can benefit from my observations. - Smith.", "WINTER_FOLLOWUP"],
        "PhoneDead": ["The phone is completely dead. No way to turn it on."],
        "PhoneClue": ["This must be one of the photos he mentioned.", "CLUE_OVERLAY", "A playing card? Why was that important?", "SHOCK_MOMENT"],
        "Lockpick": ["Hey, maybe I can use this card pick the lock.", "It worked!"],
        "VaseUnlock": ["Whoa! Using the vase triggered some kind of mechanism!", "The door to the study is open!"]
    };

    const scenes = {
        1: { bg: "Room1_Library.png", wall: 216, hotspots: [
            { id: "Torch", x: 608 * SCALE_X, y: 407 * SCALE_Y, action: () => { if(state.isDark){ pickup("Torch", "ItemTorch.png", "A torch! This helps."); state.isDark=false; renderScene();} } },
            { id: "Books", x: 951 * SCALE_X, y: 310 * SCALE_Y, action: () => pickup("Books", "ItemBooks.png", "Found some old books.") },
            { id: "Vase", x: 779 * SCALE_X, y: 302 * SCALE_Y, action: () => pickup("Vase", "ItemVase.png", "A dusty vase.") },
            { id: "Card", x: 436 * SCALE_X, y: 180 * SCALE_Y, action: () => pickup("Card", "ItemCard.png", "A playing card.") },
            { id: "Secret", x: 192, y: 504, action: () => handleSecretDoor() },
            { id: "Exit", x: 1153 * SCALE_X, y: 412 * SCALE_Y, action: () => { if(state.remarkMade) changeRoom(2); else say("I feel like I'm missing something important in this room."); } }
        ]},
        2: { bg: "Room2_Hallway.png", wall: 432, hotspots: [ 
            { id: "Back", x: 300, y: 759 * R_W_SCALE_Y, action: () => changeRoom(1) },
            { id: "Notepad", x: 1872 * R_W_SCALE_X, y: (803 * R_W_SCALE_Y) - 50, action: () => pickup("Notepad", "ItemNotepad.png", "I found a notepad.") },
            { id: "Phone", x: 369 * R_W_SCALE_X, y: (1020 * R_W_SCALE_Y) - 15, action: () => pickup("Phone", "ItemPhone.png", "An old cell phone.") },
            { id: "Next", x: 1100, y: 600 * R_W_SCALE_Y, action: () => handleBilliardEntry() },
            { id: "VaseHole", x: 1000 * R_W_SCALE_X, y: 700 * R_W_SCALE_Y, action: () => handleVaseUnlock() }
        ]},
        3: { bg: "Room3_Billiards.png", wall: 432, hotspots: [ 
            { id: "Back", x: 100, y: 759 * R_W_SCALE_Y, action: () => changeRoom(2) },
            { id: "Balls", x: 900, y: 600, action: () => pickup("Balls", "ItemBalls.png", "Pool balls...") },
            { id: "Cue", x: 1000, y: 620, action: () => pickup("Cue", "ItemCue.png", "A pool cue.") },
            { id: "Mug", x: 1250 * R_W_SCALE_X, y: 890 * R_W_SCALE_Y, action: () => pickup("Mug", "ItemMug.png", "A coffee mug.") },
            { id: "Flower", x: 800, y: 692 * R_W_SCALE_Y, action: () => handleFlower() },
            { id: "Window", x: 860 * R_W_SCALE_X, y: 450 * R_W_SCALE_Y, action: () => say("It looks like I'm high in the mountains.") }
        ]},
        5: { bg: "Room5_Rooftop.png", wall: 280, hotspots: [
            { id: "Back3", x: 192, y: 550, action: () => changeRoom(3) },
            { id: "Kidnapper", x: 1000, y: 330, action: () => { state.cutsceneStep = 100; state.dialogueStep = 0; advanceDialogue(); } }
        ]}
    };

    function handleVaseUnlock() {
        if (state.activeItem === "Vase") {
            state.isShocked = true;
            document.getElementById('winter').src = "WinterIdleShock.png";
            state.lockpicking = true; 
            state.activeItem = "VaseUnlock"; 
            state.dialogueStep = 0;
            advanceDialogue();
        } else say("There's a circular indentation in the wall.");
    }

    function handleSecretDoor() {
        if (state.gameFinished && state.activeItem === "Mug") {
            say("The mug fits! The wall is moving!");
            setTimeout(() => { changeRoom(1); }, 2000); 
        } else say("A secret door. Locked tight.");
    }

    function handleBilliardEntry() {
        if (state.room2DoorUnlocked) changeRoom(3);
        else if (state.activeItem === "Card") { state.lockpicking = true; state.dialogueStep = 0; advanceDialogue(); }
        else say("Locked. I'll need a key or something.");
    }

    function advanceDialogue() {
        const d = document.getElementById('dialogue');
        const winter = document.getElementById('winter');
        if (state.cutsceneStep >= 100) {
            const finalLines = [{ s: "K", t: "Well well Winter O'Brien..." }, { s: "W", t: "I don't approve of your methods..." }, { s: "K", t: "So you *are* saying yes?" }, { s: "W", t: "Maybe..." }];
            const idx = state.cutsceneStep - 100;
            if (idx < finalLines.length) { state.kidnapperTalking = (finalLines[idx].s === "K"); say(finalLines[idx].t); state.cutsceneStep++; }
            else { d.style.display = 'none'; state.gameFinished = true; triggerEnd(); }
            return;
        }

        const seqName = state.activeItem === "VaseUnlock" ? "VaseUnlock" : state.lockpicking ? "Lockpick" : (state.activeItem === "Phone" && state.phoneDead) ? "PhoneDead" : (state.activeItem === "Phone" && state.notepadRead) ? "PhoneClue" : state.activeItem;
        const seq = dialogueSequences[seqName];

        if (seq && state.dialogueStep < seq.length) {
            say(seq[state.dialogueStep]);
            if (seqName === "Lockpick" && state.dialogueStep === 1) { state.lockpicking = false; state.room2DoorUnlocked = true; }
            if (seqName === "VaseUnlock" && state.dialogueStep === 1) { state.lockpicking = false; state.room2DoorUnlocked = true; state.activeItem = "Vase"; }
            if (seqName === "PhoneClue" && seq[state.dialogueStep] === "CLUE_OVERLAY") document.getElementById('clue-overlay').style.display = 'flex';
            if (seqName === "PhoneClue" && seq[state.dialogueStep] === "SHOCK_MOMENT") { state.isShocked = true; winter.src = "WinterIdleShock.png"; state.phoneDead = true; say("Phone's dead now."); }
            state.dialogueStep++;
        } else { d.style.display = 'none'; state.isShocked = false; if (state.room2DoorUnlocked && state.room === 2) changeRoom(3); }
    }

    function say(msg) {
        const d = document.getElementById('dialogue');
        let img = state.kidnapperTalking ? 'KidnapperHead.png' : 'WinterHead.png';
        d.innerHTML = `<img src="${img}">${msg}<span>(Click or press any button)</span>`;
        d.style.display = 'block';
    }

    function handleFlower() {
        if (state.vasePlaced) changeRoom(5); 
        else if (state.activeItem === "Vase") { document.getElementById('bg').src = "Room3_Billiards2.png"; say("Much better!"); state.vasePlaced = true; } 
        else say("If only I had a vase...");
    }

    function pickup(name, img, msg) {
        state.inventory.push(name); document.getElementById('obj-'+name).style.display = 'none';
        const idx = state.inventory.length - 1; if(idx < 9) document.getElementById('s' + idx).innerHTML = `<img src="${img}">`;
        if (name === "Books") state.remarkMade = true;
        say(msg);
    }

    function checkProximity() {
        const prompt = document.getElementById('interact-prompt');
        let found = null;
        if (scenes[state.room].hotspots) {
            scenes[state.room].hotspots.forEach(hs => {
                const isTransition = ["Exit", "Back", "Back3", "Next", "Secret", "VaseHole"].includes(hs.id);
                if (!isTransition && state.inventory.includes(hs.id)) return;
                const dx = Math.abs(state.winterX - hs.x);
                const dy = Math.abs(state.winterY - hs.y);
                if (dx < (isTransition ? 100 : 75) && dy < (isTransition ? 250 : 150)) found = hs;
            });
        }
        state.interactable = found;
        prompt.style.display = found ? 'block' : 'none';
        if (found) { prompt.style.left = state.winterX + 'px'; prompt.style.top = (state.winterY - (state.room === 5 ? 100 : 180)) + 'px'; }
    }

    function changeRoom(id, isInitial = false) {
        const fade = document.getElementById('fade-overlay'); fade.style.opacity = "1";
        setTimeout(() => {
            const musicMap = { 1: document.getElementById('mus-room1'), 2: document.getElementById('mus-room2'), 3: document.getElementById('mus-room3'), 5: document.getElementById('mus-room5') };
            Object.values(musicMap).forEach(m => { if (m) { m.pause(); m.currentTime = 0; } });
            state.room = id; state.winterX = (id === 1 && !isInitial) ? 1100 : 80; state.winterY = 550;
            const currentMus = musicMap[id]; if (currentMus) { currentMus.volume = GLOBAL_VOLUME; currentMus.play().catch(e => {}); }
            renderScene(); fade.style.opacity = "0";
        }, 500);
    }

    function renderScene() {
        const s = scenes[state.room]; document.getElementById('bg').src = s.bg;
        document.getElementById('bg').style.filter = (state.room === 1 && state.isDark) ? "brightness(0.08)" : "none";
        
        const w = document.getElementById('winter');
        w.className = (state.room === 5) ? 'small' : '';
        const kidnapper = document.getElementById('kidnapper');
        kidnapper.style.display = (state.room === 5) ? 'block' : 'none';
        kidnapper.style.left = "1000px"; kidnapper.style.top = "330px";

        ["Torch", "Books", "Vase", "Card", "Notepad", "Phone", "Balls", "Cue", "Mug"].forEach(name => {
            const el = document.getElementById('obj-' + name); if (!el) return;
            const hs = s.hotspots ? s.hotspots.find(h => h.id === name) : null;
            el.style.display = (hs && !state.inventory.includes(name)) ? 'block' : 'none';
            if (hs) { 
                el.style.left = hs.x + "px"; el.style.top = hs.y + "px"; 
                // Fix Room 1 Layering
                if (state.room === 1 && state.isDark && name !== "Torch") {
                    el.style.zIndex = "0"; 
                } else {
                    el.style.zIndex = "20";
                }
            }
        });
    }

    function updateMovement() {
        if (document.getElementById('dialogue').style.display === 'block') return;
        let dx = 0, dy = 0; if (state.keys["KeyW"]) dy -= 5; if (state.keys["KeyS"]) dy += 5; if (state.keys["KeyA"]) dx -= 5; if (state.keys["KeyD"]) dx += 5;
        
        const gp = navigator.getGamepads()[0];
        if (gp) {
            if (Math.abs(gp.axes[0]) > 0.2) dx += gp.axes[0] * 5;
            if (Math.abs(gp.axes[1]) > 0.2) dy += gp.axes[1] * 5;
        }

        const w = document.getElementById('winter');
        if (dx !== 0 || dy !== 0) {
            state.winterX = Math.max(50, Math.min(1230, state.winterX + dx));
            state.winterY = Math.max(scenes[state.room].wall, Math.min(680, state.winterY + dy));
            state.frameTimer++;
            if (state.frameTimer > 10) {
                state.walkFrame = state.walkFrame === 0 ? 1 : 0;
                w.src = state.walkFrame === 0 ? "WinterIdle.png" : "WinterWalk1.png";
                state.frameTimer = 0;
            }
            if (dx > 0) w.style.transform = "scaleX(1)"; else if (dx < 0) w.style.transform = "scaleX(-1)";
        } else {
            w.src = state.isShocked ? "WinterIdleShock.png" : "WinterIdle.png";
        }
        w.style.left = (state.winterX - (state.room === 5 ? 29 : 46)) + 'px'; 
        w.style.top = (state.winterY - (state.room === 5 ? 75 : 120)) + 'px';
    }

    function startGame() { state.started = true; document.getElementById('title-screen').style.display = 'none'; changeRoom(1, true); say("Where am I? Why is it so dark?"); gameLoop(); }
    function gameLoop() { if(!state.started) return; updateMovement(); checkProximity(); requestAnimationFrame(gameLoop); }
    function investigateItem() { state.dialogueStep = 0; advanceDialogue(); }
    function selectItem(idx) {
        if (!state.inventory[idx]) return; state.activeItem = state.inventory[idx];
        document.getElementById('active-txt').innerText = state.activeItem.toUpperCase();
        document.querySelectorAll('.slot').forEach(s => s.classList.remove('active-slot'));
        document.getElementById('s' + idx).classList.add('active-slot');
    }
    function closeClue() { document.getElementById('clue-overlay').style.display = 'none'; advanceDialogue(); }
    function triggerEnd() { document.getElementById('end-screen').style.display = 'flex'; setTimeout(() => document.getElementById('end-screen').style.opacity = "1", 100); }

    window.addEventListener("keydown", e => {
        state.keys[e.code] = true;
        if ((e.code === "Enter" || e.code === "Space") && document.getElementById('dialogue').style.display === 'block') advanceDialogue();
        else if (e.code === "KeyE" && state.interactable) state.interactable.action();
    });
    window.addEventListener("keyup", e => state.keys[e.code] = false);
</script>
</body>
</html>
