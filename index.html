function changeRoom(id, isInitial = false) {
        // Updated to ensure IDs match the <audio> tags exactly
        const musicMap = {
            1: document.getElementById('mus-room1'),
            2: document.getElementById('mus-room2'),
            3: document.getElementById('mus-room3'),
            5: document.getElementById('mus-room5')
        };

        document.getElementById('game-container').style.opacity = "0";

        setTimeout(() => {
            // Kill all audio tracks
            Object.values(musicMap).forEach(m => { 
                if (m) { 
                    m.pause(); 
                    m.currentTime = 0; 
                } 
            });

            const prevRoom = state.room;
            state.room = id;
            
            if (id === 1) state.winterX = isInitial ? 80 : 1100;
            else if (id === 3 && prevRoom === 5) state.winterX = 1100; 
            else state.winterX = 80;
            
            state.winterY = 550;

            // Trigger the new room's music
            const currentMus = musicMap[id];
            if (currentMus) { 
                currentMus.volume = GLOBAL_VOLUME;
                // Using a promise-based play to handle browser auto-play restrictions
                const playPromise = currentMus.play();
                if (playPromise !== undefined) {
                    playPromise.catch(error => {
                        console.log("Autoplay prevented. Music will start on next interaction.");
                    });
                }
            }

            const winter = document.getElementById('winter');
            if (id === 5) winter.classList.add('small');
            else winter.classList.remove('small');
            
            winter.style.left = (state.winterX - (state.room === 5 ? 23 : 46)) + 'px'; 
            winter.style.top = (state.winterY - (state.room === 5 ? 60 : 120)) + 'px';
            
            renderScene();
            document.getElementById('game-container').style.opacity = "1";
        }, 500);
    }
