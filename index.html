<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shadows & Daylight: Labyrinth of Excalibur</title>
    <style>
        body { margin: 0; background: #000; font-family: 'Courier New', monospace; color: #be9b7b; overflow: hidden; }
        
        #game-container { 
            position: relative; width: 1280px; height: 720px; 
            margin: 40px auto; border: 6px solid #be9b7b; 
            background: #000; overflow: hidden;
        }

        #bg { width: 100%; height: 100%; image-rendering: pixelated; position: absolute; }
        
        #winter { 
            position: absolute; width: 124px; z-index: 5; 
            transform-origin: bottom center; pointer-events: none;
        }

        /* Interaction Prompt */
        #interact-prompt {
            position: absolute; background: rgba(255,255,255,0.9); color: #000;
            padding: 5px 12px; border-radius: 4px; font-weight: bold;
            font-size: 20px; z-index: 50; display: none; transform: translate(-50%, -100%);
            pointer-events: none; border: 2px solid #be9b7b;
        }
        
        #title-screen {
            position: absolute; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; transition: opacity 1s; cursor: pointer;
        }
        #title-screen .sub-title { font-size: 30px; letter-spacing: 5px; color: #be9b7b; margin: 0; }
        #title-screen .main-title { font-size: 37.5px; letter-spacing: 9px; color: #fff; text-shadow: 0 0 22px #be9b7b; margin: 15px 0; }
        #title-screen p { font-size: 18px; letter-spacing: 3px; color: #be9b7b; animation: blink 2s infinite; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .world-obj { position: absolute; z-index: 4; image-rendering: pixelated; display: none; }
        
        #inventory-bar { 
            position: absolute; bottom: 0; width: 100%; height: 100px; 
            background: rgba(0,0,0,0.9); border-top: 3px solid #be9b7b; 
            display: flex; align-items: center; padding: 0 20px; z-index: 10;
        }

        #investigate-btn {
            font-size: 40px; cursor: pointer; margin-left: 20px; 
            background: #222; border: 2px solid #be9b7b; border-radius: 5px;
            padding: 5px 15px; user-select: none;
        }

        #slots-container { display: flex; overflow-x: auto; flex-grow: 1; }
        .slot { min-width: 65px; height: 65px; border: 2px solid #444; margin-right: 10px; background: #111; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .slot img { width: 50px; height: 50px; }
        .active-slot { border-color: #fff; box-shadow: 0 0 12px #fff; }
        
        #dialogue { 
            position: absolute; top: 30px; width: 84%; left: 8%; 
            background: rgba(0,0,0,0.95); border: 3px solid #be9b7b; 
            padding: 22px; display: none; z-index: 20; color: white; 
            line-height: 1.4; font-size: 22px; cursor: pointer;
        }
        #active-txt-label { font-size: 16px; color: #be9b7b; margin-right: 15px; }
    </style>
</head>
<body>

<div id="game-container">
    <audio id="bg-music" loop><source src="Dark_ Elves_Jimena Contreras.mp3" type="audio/mpeg"></audio>

    <div id="interact-prompt">PRESS E</div>

    <div id="title-screen" onclick="startGame()">
        <div class="sub-title">SHADOWS & DAYLIGHT</div>
        <div class="main-title">LABYRINTH OF EXCALIBUR</div>
        <p>CLICK TO BEGIN (WASD TO MOVE, E TO INTERACT)</p>
    </div>

    <img id="bg" src="Room1_Library.png" style="filter: brightness(0.08);">
    
    <img id="obj-Torch" src="ItemTorch.png" class="world-obj">
    <img id="obj-Books" src="ItemBooks.png" class="world-obj">
    <img id="obj-Vase" src="ItemVase.png" class="world-obj">
    <img id="obj-Card" src="ItemCard.png" class="world-obj">
    
    <img id="winter" src="WinterIdle.png">
    
    <div id="dialogue" onclick="this.style.display='none'"></div>

    <div id="inventory-bar">
        <div id="active-txt-label">EQUIPPED: <span id="active-txt" style="color:#fff">NONE</span></div>
        <div id="slots-container">
            <div class="slot" id="s0" onclick="selectItem(0)"></div>
            <div class="slot" id="s1" onclick="selectItem(1)"></div>
            <div class="slot" id="s2" onclick="selectItem(2)"></div>
            <div class="slot" id="s3" onclick="selectItem(3)"></div>
            <div class="slot" id="s4" onclick="selectItem(4)"></div>
            <div class="slot" id="s5" onclick="selectItem(5)"></div>
            <div class="slot" id="s6" onclick="selectItem(6)"></div>
            <div class="slot" id="s7" onclick="selectItem(7)"></div>
            <div class="slot" id="s8" onclick="selectItem(8)"></div>
            <div class="slot" id="s9" onclick="selectItem(9)"></div>
        </div>
        <div id="investigate-btn" onclick="investigateItem()">🔍</div>
    </div>
</div>

<script>
    const SCALE_X = 1280 / 1376;
    const SCALE_Y = 720 / 768;

    const state = {
        room: 1, inventory: [], activeItem: null,
        isDark: true, readBook: false,
        winterX: 150, winterY: 550, 
        started: false, keys: {},
        interactable: null
    };

    const sprites = {
        side: { frame1: "WinterIdle.png", frame2: "WinterWalk1.png" },
        away: { frame1: "WinterWalkAway1.png", frame2: "WinterWalkAway2.png" }
    };

    const hotspots = [
        { id: "Torch", x: 608 * SCALE_X, y: 407 * SCALE_Y, w: 70, h: 100, action: () => {
            if (state.isDark) { pickup("Torch", "ItemTorch.png", "A torch! This helps."); state.isDark = false; renderScene(); }
        }},
        { id: "Books", x: 951 * SCALE_X, y: 310 * SCALE_Y, w: 80, h: 80, action: () => pickup("Books", "ItemBooks.png", "Some old books.") },
        { id: "Vase", x: 779 * SCALE_X, y: 302 * SCALE_Y, w: 60, h: 80, action: () => pickup("Vase", "ItemVase.png", "A dusty vase.") },
        { id: "Card", x: 436 * SCALE_X, y: 180 * SCALE_Y, w: 40, h: 60, action: () => pickup("Card", "ItemCard.png", "A playing card.") },
        { id: "Exit", x: 1130 * SCALE_X, y: 402 * SCALE_Y, w: 120, h: 250, action: () => {
            if (state.isDark) say("Too dark to leave.", true);
            else if (!state.readBook) say("I'm missing something in here.", true);
            else say("Time to see what's through this door...", true);
        }}
    ];

    window.addEventListener("keydown", e => state.keys[e.code] = true);
    window.addEventListener("keyup", e => state.keys[e.code] = false);
    window.addEventListener("keydown", e => { if(e.code === "KeyE" && state.interactable) state.interactable.action(); });

    function startGame() {
        if (state.started) return;
        state.started = true;
        const music = document.getElementById('bg-music');
        music.volume = 0.5; music.play();
        document.getElementById('title-screen').style.display = 'none';
        renderScene();
        gameLoop();
    }

    function gameLoop() {
        updateMovement();
        checkProximity();
        requestAnimationFrame(gameLoop);
    }

    let frameCount = 0;
    function updateMovement() {
        let dx = 0, dy = 0;
        if (state.keys["KeyW"]) dy -= 4;
        if (state.keys["KeyS"]) dy += 4;
        if (state.keys["KeyA"]) dx -= 4;
        if (state.keys["KeyD"]) dx += 4;

        if (dx !== 0 || dy !== 0) {
            state.winterX = Math.max(50, Math.min(1230, state.winterX + dx));
            state.winterY = Math.max(300, Math.min(680, state.winterY + dy)); // Room bounds
            
            frameCount++;
            const isAway = dy < 0 && Math.abs(dy) > Math.abs(dx);
            const currentSet = isAway ? sprites.away : sprites.side;
            const winter = document.getElementById('winter');
            
            winter.src = (Math.floor(frameCount / 10) % 2 === 0) ? currentSet.frame1 : currentSet.frame2;
            if (dx !== 0) winter.style.transform = `scale(${0.75 + (0.25 * (state.winterY / 720))}) scaleX(${dx < 0 ? -1 : 1})`;
            else winter.style.transform = `scale(${0.75 + (0.25 * (state.winterY / 720))})`;
        }
        updateWinterVisuals();
    }

    function updateWinterVisuals() {
        const winter = document.getElementById('winter');
        const currentScale = 0.75 + (0.25 * (state.winterY / 720));
        winter.style.left = (state.winterX - (62 * currentScale)) + 'px';
        winter.style.top = (state.winterY - (160 * currentScale)) + 'px';
    }

    function checkProximity() {
        const prompt = document.getElementById('interact-prompt');
        let found = null;

        hotspots.forEach(hs => {
            // Torch/Items only interactable if not picked up
            if (state.inventory.includes(hs.id)) return;
            // Exit only "visible" prompt if torch is found
            if (hs.id === "Exit" && !state.readBook) return;

            const dist = Math.sqrt(Math.pow(state.winterX - (hs.x + hs.w/2), 2) + Math.pow(state.winterY - (hs.y + hs.h), 2));
            if (dist < 80) found = hs;
        });

        if (found) {
            state.interactable = found;
            prompt.style.display = 'block';
            prompt.style.left = state.winterX + 'px';
            prompt.style.top = (state.winterY - 180) + 'px';
        } else {
            state.interactable = null;
            prompt.style.display = 'none';
        }
    }

    function investigateItem() {
        if (state.activeItem === "Books") {
            state.readBook = true;
            say("Hmm, a book on King Arthur? This looks interesting! 'Excalibur, King Arthur's sword, is believed to be hidden in Avalon, King Arthur's castle, but only the savviest archeologist, or investigator could ever find it.'", false);
            setTimeout(() => say("As tempting as it would be to find a missing relic, I just need to get out of here and find out where 'here' actually is, and why I'm here!", true), 100);
        } else if (!state.activeItem) say("I need to investigate the clues.", true);
        else say("Nothing much here.", true);
    }

    function pickup(name, img, msg) {
        state.inventory.push(name);
        const obj = document.getElementById('obj-' + name);
        if (obj) obj.style.display = 'none';
        const slot = document.getElementById('s' + (state.inventory.length - 1));
        slot.innerHTML = `<img src="${img}">`;
        say(msg, true);
    }

    function selectItem(idx) {
        if (!state.inventory[idx]) return;
        state.activeItem = state.inventory[idx];
        document.getElementById('active-txt').innerText = state.activeItem.toUpperCase();
        document.querySelectorAll('.slot').forEach(s => s.classList.remove('active-slot'));
        document.getElementById('s' + idx).classList.add('active-slot');
    }

    function say(msg, autoHide) {
        const d = document.getElementById('dialogue');
        d.innerText = msg; d.style.display = 'block';
        if (autoHide) setTimeout(() => d.style.display = 'none', 5000);
    }

    function renderScene() {
        document.getElementById('bg').style.filter = state.isDark ? "brightness(0.08)" : "none";
        ["Torch", "Books", "Vase", "Card"].forEach(name => {
            const el = document.getElementById('obj-' + name);
            if (el) {
                const hs = hotspots.find(h => h.id === name);
                el.style.left = hs.x + "px"; el.style.top = hs.y + "px"; el.style.width = hs.w + "px";
                el.style.display = (!state.isDark || name === "Torch") && !state.inventory.includes(name) ? 'block' : 'none';
            }
        });
    }

    updateWinterVisuals();
</script>
</body>
</html>
