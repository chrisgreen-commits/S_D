<style>
    /* ... previous styles ... */

    #inventory { 
        position: absolute; 
        bottom: 0; 
        width: 100%; 
        height: 112px; 
        background: rgba(0,0,0,0.9); 
        border-top: 3px solid #be9b7b; 
        display: flex; 
        align-items: center; 
        padding: 0 30px; 
        z-index: 10;
        box-sizing: border-box; /* Crucial: includes padding in width calculation */
    }

    .slot-container {
        display: flex;
        align-items: center;
    }

    .slot { 
        width: 75px; 
        height: 75px; 
        border: 2px solid #444; 
        margin-right: 15px; 
        background: #111; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        cursor: pointer; 
    }

    .slot img { width: 60px; height: 60px; }
    .active-slot { border-color: #fff; box-shadow: 0 0 12px #fff; }

    /* Fix for the bleeding text */
    #active-txt-label { 
        margin-left: auto; /* Pushes the label to the far right */
        font-size: 22px; 
        padding-right: 40px; /* Buffer to keep it away from the edge */
        white-space: nowrap; /* Prevents text from wrapping */
        color: #be9b7b;
    }
</style>

<div id="inventory">
    <div class="slot-container">
        <div class="slot" id="s0" onclick="selectItem(0)"></div>
        <div class="slot" id="s1" onclick="selectItem(1)"></div>
        <div class="slot" id="s2" onclick="selectItem(2)"></div>
        <div class="slot" id="s3" onclick="selectItem(3)"></div>
        <div class="slot" id="s4" onclick="selectItem(4)"></div>
        <div class="slot" id="s5" onclick="selectItem(5)"></div>
    </div>
    <div id="active-txt-label">EQUIPPED: <span id="active-txt" style="color:#fff">NONE</span></div>
</div>
