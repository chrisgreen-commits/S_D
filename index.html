<script>
    // ... existing constants ...

    const state = {
        room: 1, inventory: [], activeItem: null, activeIdx: -1,
        isDark: true, dialogueStep: 0, remarkMade: false,
        winterX: 80, winterY: 550, started: false, keys: {},
        interactable: null, vasePlaced: false, cutsceneStep: 0,
        kidnapperTalking: false, phoneDead: false, notepadRead: false,
        lockpicking: false, isShocked: false, walkFrame: 0, frameTimer: 0,
        room2DoorUnlocked: false,
        coffeeBeans: 0, playerLives: 1,
        gameCompleted: false
    };

    function pollGamepad() {
        const gamepads = navigator.getGamepads ? navigator.getGamepads() : [];
        for (let gp of gamepads) {
            if (!gp) continue;
            if (!gamepadState.prevButtons[gp.index]) {
                gamepadState.prevButtons[gp.index] = new Array(gp.buttons.length).fill(false);
            }
            for (let i = 0; i < gp.buttons.length; i++) {
                const pressed = gp.buttons[i].pressed;
                const wasPrev = gamepadState.prevButtons[gp.index][i];

                if (pressed && !wasPrev) {
                    // FIX: Allow gamepad to dismiss credits and the clue overlay
                    if (document.getElementById('end-screen').style.display === 'flex') { closeCredits(); }
                    else if (document.getElementById('clue-overlay').style.display === 'flex') { closeClue(); }
                    else if (titleShowing) { showPasswordScreen(); }
                    else if (!passwordPassed) { } 
                    else if (document.getElementById('dialogue').style.display === 'block') { advanceDialogue(); }
                    else if (i === 2) { investigateItem(); }
                    else if (i === 4 || i === 14) { cycleInventory(-1); }
                    else if (i === 5 || i === 15) { cycleInventory(1); }
                    else if (state.interactable) { state.interactable.action(); }
                }
                gamepadState.prevButtons[gp.index][i] = pressed;
            }
            // ... rest of polling ...
        }
        requestAnimationFrame(pollGamepad);
    }

    const scenes = {
        1: { bg: "Room1_Library.png", wall: 216, hotspots: [
            // ... other hotspots ...
            { id: "Secret", x: 192, y: 504, action: () => {
                if (state.activeItem === "Mug") { 
                    changeRoom(4); // Transport to Secret Room
                    say("The coffee bean power opens the secret door!"); 
                } 
                else { say("Hmm, a secret door. It's locked tight. I'll need to find another way."); }
            }},
            { id: "Exit", x: 1153 * SCALE_X, y: 412 * SCALE_Y, action: () => { if(state.remarkMade) changeRoom(2); else say("I feel like I'm missing something important in this room."); } }
        ]},
        2: { /* ... hallway hotspots ... */ },
        3: { /* ... billiard hotspots ... */ },
        // ADDED: Secret Room (White Void)
        4: { bg: "WHITE_VOID", wall: 216, hotspots: [
            { id: "Back", x: 100, y: 550, action: () => changeRoom(1) }
        ]},
        5: { bg: "Room5_Rooftop.png", wall: 280, hotspots: [
            { id: "Back3", x: 192, y: 550 - 25, action: () => changeRoom(3) },
            { id: "Kidnapper", x: 1000, y: 330 + 50 + 15, action: () => { if(state.gameCompleted) return; state.cutsceneStep = 100; state.dialogueStep = 0; advanceDialogue(); } }
        ]}
    };

    function renderScene() {
        const s = scenes[state.room]; 
        let bgImg = s.bg;
        const bgEl = document.getElementById('bg');
        
        // Handle Secret Room Background
        if (bgImg === "WHITE_VOID") {
            bgEl.src = "data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"; // Transparent pixel
            bgEl.style.backgroundColor = "white";
            bgEl.style.filter = "none";
        } else {
            if (state.room === 3 && state.vasePlaced) bgImg = "Room3_Billiards3.png";
            bgEl.src = bgImg;
            bgEl.style.backgroundColor = "transparent";
            bgEl.style.filter = (state.room === 1 && state.isDark) ? "brightness(0.08)" : "none";
        }
        
        // ... rest of item and kidnapper rendering ...
    }

    // FIX: Clear completion state so credits only show when conversation is finished
    function closeCredits() { 
        document.getElementById('end-screen').style.display = 'none'; 
        state.gameCompleted = false; 
    }

    // FIX: Allow keyboard to dismiss clue overlay
    window.addEventListener("keydown", e => {
        state.keys[e.code] = true;
        if (document.getElementById('end-screen').style.display === 'flex') { closeCredits(); return; }
        if (document.getElementById('clue-overlay').style.display === 'flex') { closeClue(); return; }
        
        if (titleShowing && (e.code === "Enter" || e.code === "Space")) {
            showPasswordScreen();
            return;
        }
        if (!passwordPassed) return;
        if (e.code === "Enter" || e.code === "Space") {
            if (document.getElementById('dialogue').style.display === 'block') { advanceDialogue(); return; }
        }
        if (e.code === "KeyE" && state.interactable) state.interactable.action();
    });
</script>
